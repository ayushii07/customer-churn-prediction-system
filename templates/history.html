<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#eef2ff;
            padding:40px;
        }

        h1{
            text-align:center;
            color:#1e293b;
            margin-bottom:40px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:
            0 10px 25px rgba(0,0,0,0.08);
        }

        th{
            background:#4f46e5;
            color:white;
            padding:18px;
        }

        td{
            text-align:center;
            padding:16px;
            border-bottom:
            1px solid #e5e7eb;
        }

        tr:hover{
            background:#f8fafc;
        }

    </style>
</head>

<body>

<h1>
    Prediction History
</h1>

<table>

    <tr>
        <th>ID</th>
        <th>Gender</th>
        <th>Senior</th>
        <th>Tenure</th>
        <th>Monthly Charges</th>
        <th>Total Charges</th>
        <th>Prediction</th>
        <th>Probability</th>
    </tr>

    {% for row in predictions %}

    <tr>
        <td>{{ row.id }}</td>
        <td>{{ row.gender }}</td>
        <td>{{ row.senior }}</td>
        <td>{{ row.tenure }}</td>
        <td>{{ row.monthly_charges }}</td>
        <td>{{ row.total_charges }}</td>
        <td>{{ row.prediction }}</td>
        <td>{{ row.probability }}%</td>
    </tr>

    {% endfor %}

</table>

</body>
</html>
